name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Install dependencies
        run: |
          cd server
          go mod download

      - name: Run unit tests
        run: |
          cd server
          go test -v -race -coverprofile=coverage.out ./...

      - name: Run E2E tests
        run: |
          cd server
          go test -v -run TestE2E ./internal/gamecore/

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: server/coverage.out

  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Run go vet
        run: |
          cd server
          go vet ./...

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Build server
        run: |
          cd server
          go build -o siliconworld ./cmd/server

      - name: Build client
        run: |
          cd client
          npm ci
          npm run build
