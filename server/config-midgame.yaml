      minerals: 5000
      energy: 3000
      inventory:
        - item_id: frame_material
          quantity: 16
        - item_id: deuterium_fuel_rod
          quantity: 16
        - item_id: quantum_chip
          quantity: 16
        - item_id: solar_sail
          quantity: 16
        - item_id: small_carrier_rocket
          quantity: 4
      completed_techs:
        - electromagnetism
        - basic_logistics_system
        - automatic_metallurgy
        - basic_assembling_processes
        - high_strength_crystal
        - titanium_alloy
        - lightweight_structure
        - dyson_component
        - interstellar_logistics
        - interstellar_power
        - signal_tower
        - plasma_turret
