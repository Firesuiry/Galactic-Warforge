server:
  port: 18080
  rate_limit: 20
  event_history_limit: 2000
  snapshot_max_events: 200
  alert_history_limit: 1000
  data_dir: "data-war"
  auto_save_interval_seconds: 60
  snapshot_interval_ticks: 5000
  snapshot_retention_ticks: 30000
  snapshot_retention_count: 6
  snapshot_max_bytes: 268435456
  snapshot_delta_max_bytes: 134217728
  production_monitor:
    sample_interval_ticks: 5
    max_entities_per_sample: 500
    backlog_warn_ratio: 0.6
    backlog_critical_ratio: 0.9
    shortage_ratio: 0.2
    efficiency_warn_ratio: 0.5
    alert_cooldown_ticks: 20
